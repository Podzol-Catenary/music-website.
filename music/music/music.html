<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像ギャラリー</title>

<style>
body {
    margin: 0;
    padding: 40px 0;
    font-family: sans-serif;
    background: #f5f5f5;
}

/* ページタイトル */
.page-title {
    text-align: center;
    font-size: 36px;
    font-weight: bold;
    font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
    margin-bottom: 40px;
}

/* ギャラリー全体 */
.gallery-wrapper {
    width: 80%;          /* 左右10%ずつ余白 */
    margin: 0 auto;      /* 中央寄せ */
}

/* 画像グリッド */
.gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

/* 各画像ブロック */
.item {
    text-align: center;
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* 画像 */
.item img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
}

/* 説明文 */
.caption {
    margin-top: 10px;
    font-size: 14px;
    color: #333;
}

/* スマホ対応 */
@media screen and (max-width: 768px) {

    .gallery-wrapper {
        width: 90%;
    }

    .gallery {
        grid-template-columns: 1fr;
    }

    .page-title {
        font-size: 28px;
    }
}
</style>
</head>

<body>

<h1 class="page-title">ページタイトル</h1>

<div class="gallery-wrapper">

    <div class="gallery">

        <div class="item">
            <img src="image1.jpg" alt="">
            <div class="caption">説明文1</div>
        </div>

        <div class="item">
            <img src="image2.jpg" alt="">
            <div class="caption">説明文2</div>
        </div>

        <div class="item">
            <img src="image3.jpg" alt="">
            <div class="caption">説明文3</div>
        </div>

        <div class="item">
            <img src="image4.jpg" alt="">
            <div class="caption">説明文4</div>
        </div>

        <div class="item">
            <img src="image5.jpg" alt="">
            <div class="caption">説明文5</div>
        </div>

        <div class="item">
            <img src="image6.jpg" alt="">
            <div class="caption">説明文6</div>
        </div>

        <div class="item">
            <img src="image7.jpg" alt="">
            <div class="caption">説明文7</div>
        </div>

        <div class="item">
            <img src="image8.jpg" alt="">
            <div class="caption">説明文8</div>
        </div>

    </div>

</div>

</body>
</html>
