<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>アルバム紹介ページ</title>

<style>
body{
    margin:0;
    padding:40px;
    font-family:
        "Yu Gothic",
        "Hiragino Sans",
        sans-serif;
    background:#f5f5f5;
}

/* 全体レイアウト */
.content{
    display:flex;
    align-items:flex-start;
    gap:50px;

    width:80%;
    margin:0 auto;
}

/* 左右エリア */
.image-area,
.text-area{
    width:50%;
}

/* 正方形画像 */
.image-area img{
    width:100%;
    aspect-ratio:1 / 1;
    object-fit:cover;

    border-radius:10px;
    display:block;
}

/* タイトル */
.title{
    font-size:32px;
    font-weight:300;
    color:#222;

    margin:0 0 15px 0;
}

/* ボタン */
.link-button{
    display:inline-block;

    background:#888888;
    color:white;

    text-decoration:none;

    padding:12px 28px;
    border-radius:6px;

    font-size:14px;

    transition:0.3s;

    margin-bottom:25px;
}

/* ホバー時 */
.link-button:hover{
    background:#666666;
}

/* 横線 */
.line{
    border:none;
    border-top:1px solid #cccccc;

    margin-bottom:25px;
}

/* 説明文 */
.description{
    font-size:16px;
    line-height:1.9;
    color:#444;
}

/* スマホ対応 */
@media screen and (max-width:768px){

    .content{
        flex-direction:column;
        width:90%;
        gap:30px;
    }

    .image-area,
    .text-area{
        width:100%;
    }

    .title{
        font-size:26px;
    }
}
</style>
</head>

<body>

<header>
<h1 id="logo"><a href="index.html"><img src="logo.png" alt="podzol-catenary" height="50"></a></h1>
</header>
<img src="mainimg.jpg" style="width:70%; height: auto;">

<h1 class="page-title">春は夢のように</h1>


<div class="content">

    <!-- 左側画像 -->
    <div class="image-area">
        <img src="../../nudja/jacket/haruhayume.jpg" alt="ジャケット画像">
    </div>

    <!-- 右側説明 -->
    <div class="text-area">

        <h1 class="title">春は夢のように</h1>
        <h2 class="description">CD/CD&Booklet</h2>
        <h2 class="description">2026.4.26</h2>
     <!-- ボタン -->
        <a href="https://thenudjaconspiracy.bandcamp.com/album/--3" class="link-button">
            Bandcamp
        </a>

        <hr class="line">

        <div class="description">
            ここに説明文を入力します。<br><br>

            このエリアには画像に関する詳細説明や紹介文などを自由に記載できます。
            横書き表示で、スマホでは画像の下に説明文が表示されるレスポンシブ対応になっています。<br><br>

            HTMLとCSSのみで構成しているため、
            そのままコピーして使用できます。
        </div>

    </div>

</div>

</body>
</html>
