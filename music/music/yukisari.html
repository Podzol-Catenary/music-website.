<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>アルバム紹介ページ</title>

<style>
body{
    margin:0;
    padding:40px;

    font-family:
        "Yu Gothic",
        "Hiragino Sans",
        sans-serif;
    background:#f5f5f5;
}

/* 全体レイアウト */
.content{
    display:flex;
    align-items:flex-start;
    gap:10px;

    width:100%;
    margin:0 auto;
}

/* 左右を同じ幅にする */
.image-area,
.text-area{
    width:50%;
}

/* 左側画像エリア */
.image-area{
    display:flex;
    justify-content:center; /* 横方向中央 */
    transform: translateX(-10px); /* ← 100px左にずらす */
}

/* 正方形画像 */
.image-area img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:10px;
    display:block;
}

/* 画像中央表示 */
.class1 {
  text-align: center;
}

/* タイトル */
.title{
    font-size:32px;
    font-weight:200;
    color:#222;

    margin:0 0 15px 0;
}

/* ボタン */
.link-button{
    display:inline-block;

    background:#888888;
    color:white;

    text-decoration:none;

    padding:12px 28px;
    border-radius:6px;

    font-size:16px;

    transition:0.3s;

    margin-bottom:25px;
}

/* ホバー時 */
.link-button:hover{
    background:#666666;
}

/* 横線 */
.line{
    border:none;
    border-top:1px solid #cccccc;

    margin-bottom:25px;
}

/* 説明文 */
.description{
    font-size:16px;
    font-weight:200;
    color:#444;
}

/* スマホ対応 */
@media screen and (max-width:768px){

    .content{
        flex-direction:column;
        width:90%;
        gap:30px;
    }

    .image-area,
    .text-area{
        width:100%;
    }

    .title{
        font-size:26px;
    }
}
</style>
</head>

<body>

<header>
<h1 id="logo"><a href="https://podzol-catenary.github.io/music-website./index.html">
 <div class="class1">
 <img src="https://podzol-catenary.github.io/music-website./logo.png" alt="podzol-catenary" height="75"></a></h1>
 </div>
</header>

<div class="content">

<!-- 左側画像 -->
<div class="image-area">
<a href="https://podzol.booth.pm/items/8389998">
<img src="../../music/music/jacket/yukisari.jpg" alt="ジャケット画像">
</a>
</div>

<!-- 右側説明 -->
<div class="text-area">
<h1 class="title">Podzol & Sidran</h1>
<h1 class="title">行きさりの波際</h1>
<h1 class="description">2026.4.26</h1>


<!-- ボタン -->
<a href="https://podzol.booth.pm/items/8389998" class="link-button">
▶︎Booth
</a>

<hr class="line">
<h2 class="title">Tracklist</h2>
<div class="description">
1. Free Improvisation #1<br>
2. Free Improvisation #2<br>
3. 深夜海道<br>
4. 北へ向かう波<br>
</div>

<hr class="line">
<h2 class="title">Credits</h2>
<div class="description">
Music:<br>
Guitar: Podzol<br>
Bass: Sidran<br>
<br>
Artwork: Podzol
</div>

</div>
</div>

</body>
</html>
