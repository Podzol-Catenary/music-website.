<h1>広島県尾道市 己斐本町/己斐西町/己斐中(西広島駅周辺)</h1>

 <section>
<h3>己斐の街並み</h3>
<p>探訪:2021-2026<br>
<br>
広島市街地西部、西広島駅周辺の街並み。己斐古城跡のある山と太田川放水路に挟まれた地区で、山側には坂道や階段、川側には住宅地が広がる。浜田樹苗園給水塔(旧日本麻紡績株式会社給水塔)や洋館付き邸宅など近代の建物がわずかにみられる。
<br></p>
