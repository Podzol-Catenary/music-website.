<h1>広島県広島市 仁保地区</h1>

 <section>
<h3>仁保の街並み</h3>
<p>探訪:2021-2026<br>
 広島市街地の南部に位置する街並み。古くは仁保島という離島だったが、江戸時代に埋め立てが進み本土と陸続きとなった。現在は住宅地化が進み、現代的な建物の間にわずかに古い街並みが残る。<br>
 仁保島村資料館へ続く小道の入り口に和洋折衷式の旧郵便局舎が現存しており、波模様をあしらったモルタル壁や、幾何学模様のステンドグラスなどが珍しい。<br></p>
