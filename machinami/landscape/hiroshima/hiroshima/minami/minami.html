 <section>
<h3>皆実町の街並み</h3>
<p>探訪:2021-2026<br>
 広島市街地の南部に位置する住宅街。爆心地から数2.5km程度離れており、洋館付きの邸宅の個人邸など戦前の建物がわずかに現存する。近年は住宅の建て替えが進んでおり現代的な建物が多くなってきているが、昭和の雰囲気を残すものとして旧皆実中央市場、個人経営の喫茶店などがみられる。<br></p>
