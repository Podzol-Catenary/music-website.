<h1>広島県尾道市 西久保町/東久保町</h1>

 <section>
<h3>西久保町/東久保町の街並み</h3>
<p>探訪:2021-2026<br>
<br>
尾道市街地東部に広がる街並み。山陽本線よりも北側の山手側の地区となり、街並みには路地階段が多くみられるほか、西國寺、西郷寺や浄土寺など国の史跡に指定されている歴史ある寺社仏閣が現存する。
東久保町の旧久保小学校校舎は戦前築のモダンな洋風建築であるが、耐震性などの理由から解体が決定している。
<br></p>
