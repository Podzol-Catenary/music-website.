<h1>広島県尾道市 西土堂町/東土堂町</h1>

 <section>
<h3>西土堂町/東土堂町の街並み</h3>
<p>探訪:2019-2026<br>
<br>
千光寺山裾に位置する街並みで山陽本線よりも北側の地区。地区のほぼ全てが傾斜地であるため街並みには路地階段が多くみられるほか、天寧寺塔婆、みはらし亭など国の文化財に指定されている歴史ある建築が多数現存する。
尾道駅の裏手に建つ旧土堂小学校校舎は戦前築のモダンな洋風建築であるが、耐震性などの理由から解体が決定している。
<br></p>
