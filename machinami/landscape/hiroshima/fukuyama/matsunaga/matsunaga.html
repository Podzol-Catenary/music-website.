<h1>広島県福山市 松永町</h1>

 <section>
<h3>松永の街並み</h3>
<p>探訪:2019-2026<br>
 瀬戸内海に面した街並みで、尾道と福山の間に位置する。現在の松永駅前は広範囲の住宅地となっているが戦前はそのほとんどが海であり、山裾の限られた土地に住宅を建てるため、
 川沿いに迫り出すようにして街並みが形成された。現在は駅から少し歩いた羽原川沿いに古い街並みを見ることができる。<br>
 古くから下駄産業が盛んで、下駄製造・販売関連の建物として町内には はきもの博物館(旧マルヤマ商店)の本格的な洋館のほか、赤屋根の洋館が見事な丸山邸などが現存する。<br></p>
