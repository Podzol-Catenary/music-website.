<h1>広島県 福山市</h1>

 <section>
<h3>福山の街並み</h3>
<p>探訪:2019-2026<br>
 広島県東部、瀬戸内海に面して開かれた街で、県内2番目の人口を誇る。岡山と隣接することから、方言や地域性は広島地区(安芸)のものとは異なり、岡山の倉敷・笠岡地区(備後)と近い。<br>
 戦時中には空襲で市街地の80%が焼失するなど大きな被害があったが、福寿会館、城東地区の町並みなど戦前建物が複数現存しているほか、鞆の浦の街並みや、松永の街並みなど市街地から外れたエリアにも古い街並みが多く残っている。<br></p>
