<h1>広島県呉市 三条</h1>

 <section>
<h3>三条の街並み</h3>
<p>探訪:2021-2026<br>
<br>
呉市街地西側、二河川に沿って広がる街並み。現在の呉港にあたるエリアは、戦前は海軍用地であり、商業の港としては市街地西側の外れにある川原石・海岸地区が栄えていた。そのため、海岸地区から市街地側に続く三条地区には商店街が形成され大いに賑わっていた。<br>
現在は商業の中心地が駅近と大通エリアに変わったため、三条商店街の店舗数は減少している。商店街を感じさせる名残として、「三条銀座」のレトロな看板と、戦前から戦後期にかけての看板建築が数棟現存している。<br></p>
