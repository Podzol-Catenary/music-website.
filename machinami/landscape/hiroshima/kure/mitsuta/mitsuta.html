<h1>広島県呉市 西三津田町/東三津田町</h1>

 <section>
<h3>西三津田町/東三津田町の街並み</h3>
<p>探訪:2021-2026<br>
<br>
呉市街地西側、市街地を見下ろす高台の傾斜地に広がる坂の街並み。
明治以降、海軍と造船の街として発展する中で無秩序的に形成された路地階段の街並みで、重厚な石垣や日本家屋、洋館付きの住宅がみられる。町内の神社「鯛の宮」は周辺地区のシンボルで、毎年10月に秋祭りが行われている。<br></p>
