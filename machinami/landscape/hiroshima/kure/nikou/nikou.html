 <section>
<h3>二河峡町の街並み</h3>
<p>探訪:2021-2026<br>
<br>
呉市街地北側、二河川沿いに形成された街並み。
河口から数kmしか離れていないにも関わらず、川幅が狭く、山肌の切り立った山谷部のような風景を見ることができる。街並みには戦後の建物が多いが、数棟の洋館付き邸宅が現存している。<br></p>
