<h1>北海道 名寄市</h1>

 <section>
<h3>名寄市街の街並み</h3>

<p>探訪:2022.5, 2022.12<br>
 名寄川と天塩川に挟まれた平地に形成された街並み。農地開発を主として集落が形成されたのち、鉄道整備後は宗谷本線と名寄本線の交通結節点として発展した。<br>
 市内には昭和期の商店街が残るほか、名寄駅舎、キリスト教団名寄教会の近代建築が現存する。<br></p>
