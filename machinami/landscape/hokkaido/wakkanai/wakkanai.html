<h1>北海道 稚内市</h1>

 <section>
<h3>稚内の街並み</h3>
<p>探訪:2022.11<br>
 ロジアが実効支配している北方領土を除けば、日本最北端の都市である。<br>
 古くからニシン漁など水産業で栄えた港町で、当時の隆盛を物語る遺産として船元の邸宅「旧瀬戸邸」が登録有形文化財に登録され保存されている。<br>
 戦前に稚内港に整備された防波堤「稚内港北防波堤ドーム」はその名の通り防波堤でありながらトンネルのようなドーム形状となっており、西洋建築風の意匠も施され、稚内の港湾周辺を象徴する構造物となっている。<br></p>
