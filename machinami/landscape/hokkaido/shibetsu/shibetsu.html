<h1>北海道 士別市</h1>

 <section>
<p><strong>士別市街の街並み</strong><br>
 探訪:2022.9<br>
 剣淵川と士別川に挟まれた平地に形成された街並み。古くから農業生産の集積地として栄え、現在も駅前には赤煉瓦倉庫など歴史的建物が僅かに残る。市内を運行する路線バス、士別軌道のモノコックバスや、朝日地区の旧佐藤医院洋館が有名。<br>
 根室管内で同じ読みの「標津」と区別するため、道民はこの街を「サムライしべつ」と呼ぶ。<br></p>
