<h1>北海道 富良野市</h1>

<section>
<p>富良野の街並み <br>
探訪:2022.1<br>
北海道のほぼ中央に位置し、農業を主産業として発展したがラベンダー栽培や富良野メロンなど地域の特産を生かして現在では観光の街としても知られる。<br>
市内には、北海道の中央という意味をもじって「へそ歓楽街」なる飲食街があるほか、戦前築の洋風医院建築が現存している。<br></p>
