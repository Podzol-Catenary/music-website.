<h1>北海道 函館市</h1>

 <section>
<h3>函館の街並み (杉並町エリア)</h3>
<p>探訪:2023.2 <br>
 <br>
 北海道南端に位置する歴史ある港町。戦前建物の多くが西洋風の意匠を施した異国情緒あふれる造形となっており、。<br>
 函館山の裾野に位置し、平地が多く港湾地区に面する末広町エリアでは建築群と合わせて海と坂道を背景に路面電車が行き交う風景を見ることができる。<br></p>
