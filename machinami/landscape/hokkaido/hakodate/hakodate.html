<h1>北海道 函館市</h1>

 <section>
<h3>函館の街並み</h3>
<p>探訪:2023.2 <br>
 <br>
 北海道南端に位置する歴史ある港町。戦前建物の多くが西洋風の意匠を施した異国情緒あふれる造形となっており、建築群と合わせて海と坂道を背景に路面電車が行き交う風景はさながら外国のようである。<br>
 重要伝統的建築物群保存地区に指定されている元町エリアでは一階部分が和風、二階部分が洋風という上下で和洋が折衷する特徴的な形式の近代建築が多く見られるほか、五稜郭に程近い杉並町エリアでは三角屋根の特徴的な洋館付き邸宅が多数現存する。<br></p>
<br>
