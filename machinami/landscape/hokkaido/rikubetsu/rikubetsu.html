<p>探訪:2022.11<br>
 十勝平野北東部の高原に位置する街並みで、過去にはマイナス35.5度(1977年)を記録したこともあり、日本で一番寒い街として知られる。<br>
 かつては旧国鉄池北線が引かれていたが、　第三セクター路線のふるさと銀河線に転換されたのち2006年に全線廃止された。<br></p>
