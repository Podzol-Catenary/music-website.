<h1>北海道苫前郡 苫前町</h1>

 <section>
<h3>苫前の街並み</h3>
<p>探訪:2022 2023<br>
 オホーツク海沿岸、網走川の河口に築かれた街並みで農業、漁業を主産業とする。冬季には流氷が接岸する。<br>
 明治時代に作られた放射形状の房をもつ独特な構造の刑務所、網走刑務所が全国的に有名であるほか、戦前の建築とは思えないほど奇抜で幾何学的な造形の網走市立郷土博物館の建築など戦前の建物が複数現存する。<br></p>
