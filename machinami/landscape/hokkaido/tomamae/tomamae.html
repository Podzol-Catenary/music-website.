<h1>北海道苫前郡 苫前町</h1>

 <section>
<h3>苫前の街並み</h3>
<p>探訪:2022.12<br>
 道北日本海側に開かれた街で、水産業のほかに農業・林業も盛ん。<br>
 昭和初期の洋館建築、旧苫前村役場の建物が資料館として活用されており、大正時代に町内にて起こったヒグマ被害、三毛別羆事件のほか町内の歴史などについて展示してある。<br></p>
