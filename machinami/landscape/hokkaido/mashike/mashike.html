<p>探訪:2022.9<br>
 北海道日本海側に築かれた街並みで、古くからニシン漁で栄えるなど漁業が盛ん。<br>
 街並みには旧増毛駅舎、駅前旅館の旧富田屋など戦前期の歴史的建築が多く残る。<br></p>
