 <section>
<h3>釧路の街並み</h3>
<p>探訪:2022.5 <br>
 北海道東部、太平洋に面して築かれた港町。水産・漁業に加えて製紙業と炭鉱業も盛んである。<br>
 釧路の市街地は釧路川河口の両岸に形成され、最も海側にかかる「幣舞橋」とその周辺は水辺と合わせた景観作りがなされており広く市民に親しまれている。<br></p>
