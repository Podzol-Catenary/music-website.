<h1>北海道 留萌市</h1>

 <section>
<h3>留萌の街並み</h3>
<p>探訪:2022.9<br>
 留萌振興局管内最大の街。日本海に面した街で水産業のほかに、周辺地域の中心都市として商業・工業も盛ん。<br>
 かつては道央の深川駅から日本海沿岸の増毛駅を結ぶ留萌本線の中継駅（留萌駅）が街の中心に置かれていたが、2016年に増毛駅-留萌駅間が廃止、2023年に留萌駅-石狩沼田駅間が廃止、2026年に石狩沼田駅-深川駅間が廃止と断続的に路線廃止が進み、現在では全線廃線となっている。<br></p>
