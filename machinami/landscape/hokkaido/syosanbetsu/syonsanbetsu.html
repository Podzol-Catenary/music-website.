<h1>北海道苫前郡 初山別村</h1>

 <section>
<h3>初山別村の街並み</h3>
<p>探訪:2022 2023<br>
 留萌振興局内では唯一の村となる。北海道日本海側に面した街並みで、水産業のほか農業・酪農業も盛ん。<br>
 村は南北に長く、役場のある中心地域のほかに、北部（豊岬地区）、南部（有明地区）など集落が点在している。沿岸地区では冬季に日本海側からの強烈な暴風が吹きつけるため、家々の前には板材を組み合わせた数メートルの規模の風除けが建てられており、特徴的な街並み風景となっていた。<br></p>
