<h1>北海道 室蘭市</h1>

 <section>
<h3>室蘭の街並み</h3>
<p>探訪:2022.12, 2026.1<br>
 太平洋に突き出す岬に沿って形成された港町。明治時代に室蘭港が開港して以降内陸で産出される石炭の輸出港として発展したほか、日本製鋼所の設立により重工業の街として日本の近代化を支えた。<br>
 旧室蘭駅舎や旧北海道炭礦汽船関連の建物など街並みには室蘭発展の歴史を物語る建築が多数現存するほか、急傾斜地に築かれた住宅街と港湾地区との立体感ある景観的対比、地球岬やイタンキ浜などのスケールの大きい自然風景など見どころの多い街並みである。</p>
