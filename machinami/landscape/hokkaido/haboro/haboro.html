<h1>北海道苫前郡 羽幌町</h1>

 <section>
<h3>羽幌の街並み</h3>
<p>探訪:2022.12<br>
 かつては国内有数の良質炭鉱「羽幌炭鉱」を抱える街として大いに栄えた。<br>
 炭鉱閉山後は人口減少が著しいが、現在でも留萌振興局管内では留萌市に次ぐ人口2番目の規模を持ち、飲食街や老舗旅館のほか、町内発着のバスターミナルからは札幌直行便があるなど賑わう。<br></p>
