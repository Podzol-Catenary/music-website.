 <section>
<h3>豊富の街並み</h3>
<p>探訪:2022 2023<br>
 道北日本海側に位置する街で、町内西側には広大なサロベツ原野が広がる。<br>
 大正時代に湧出した豊富温泉は現在も観光地として賑わっており、訪れた時は冬の遅い時間帯であったが、駅からやや離れた小さな温泉街に観光客がちらほらと立ち寄る風景が印象的だった。<br></p>
