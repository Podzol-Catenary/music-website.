<p>南富良野の風景<br>
 探訪:2022.1<br>
 JR根室本線が町内を通っていたが、2024年4月に富良野-新得駅間が廃止されたことに伴い下金山駅、金山駅、東鹿越駅、幾寅駅、落合駅が廃止となり、町内から鉄道駅が消失した。<br></p>
