<h3>栗山町の街並み</h3>
<p>探訪:2023.2 <br>
 <br>
 仙台藩角田藩士により開拓されたことから明治23年に角田村として発足。その後昭和24年に町制施工し栗山町となった。<br>
 洋風の医院や純和風の古民家など駅周辺に近代建築が現存するほか、小林酒造に関連する赤煉瓦蔵などが登録有形文化財として登録されている。<br></p>
