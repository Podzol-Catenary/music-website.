 <section>
<h3>足寄の街並み</h3>
<p>探訪:2026.1<br>
 十勝平野の北東部に築かれた街並みで、農林業を主とする。2006年まではふるさと銀河鉄道（旧国鉄池北線）の足寄駅があったが、全線廃線に伴い町内から鉄道駅が消失した。<br>
 フォークシンガーの松山千春出身の地としても知られる。<br></p>
