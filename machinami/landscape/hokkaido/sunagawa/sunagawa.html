<h1>北海道 砂川市</h1>

 <section>
<h3>砂川の街並み</h3>
<p>探訪:2022.12 <br>
 <br>
 砂川を訪れたのは2022年の冬だった。羽幌から稚内へと北上し、名寄本線で南下する旅路の途中で立ち寄った。<br>
 駅を降りる頃にはすっかり日は暮れていて、雪が盛んに降りしきっていた。風も強く、カメラを構える手が凍りつくような気温の中で駅前を歩き始めると、商店街の橙色の電球が風雪に乱反射し、まるで夢の世界にでも迷い込んだような光景だった。<br>
